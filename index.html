<!DOCTYPE html>

  <head>

    </style>

    <header>
      <h1>cafetaria</h1>
      
    <nav>
      <a href="#">HOME</a>

      <button type="submit">ORDER ONLINE</button>
    </nav>
    </header>


    <main>
    
      <form>
        <h3>MAKE A RESERVATION</h3>

        <input
          type="text"
          placeholder="No. of People"
          name="people"
          required
        /><br />

        <input
          type="date"

          name="date"
          required
        /><br />

        <input
          type="time"
          placeholder="Time"
          name="time"
          required
        /><br />

        <button type="submit">FIND A TABLE</button>

      <hr />


      <table>
        <thead>

            </tr>

            <td>
          </tr>
          <tr>
            <td>Cheesecake</td>
            <td>Sandwiches</td>

            </tr>
            <tr>
            <td>Churros</td>

      </table>
